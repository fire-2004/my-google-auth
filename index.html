<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Google Sign-In</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #0d47a1;
            margin-bottom: 20px;
        }
        button {
            background-color: #4285f4;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #357ae8;
        }
        #auth-status {
            margin-top: 25px;
            font-size: 1.1em;
            font-weight: bold;
            color: #555;
        }
        #user-info {
            margin-top: 20px;
            text-align: left;
            background-color: #e8f0fe;
            padding: 15px;
            border-radius: 5px;
            word-break: break-all; /* Ensures long strings wrap */
            white-space: pre-wrap; /* Preserves whitespace and wraps lines */
        }
        #user-info pre {
            margin: 0;
            font-size: 0.9em;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Firebase Google Sign-In</h1>
        <div id="auth-buttons">
            <button id="google-sign-in-btn">Sign in with Google</button>
            <button id="sign-out-btn" style="display: none;">Sign Out</button>
        </div>
        <p id="auth-status"></p>
        <div id="user-info">
            <h2>User Info (JSON Response):</h2>
            <pre id="json-display">No user signed in.</pre>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyDUs1G-nzJwL78GsaUQX-BmbRz6QSW6_kU",
          authDomain: "testing-eb8f6.firebaseapp.com",
          projectId: "testing-eb8f6",
          storageBucket: "testing-eb8f6.firebasestorage.app",
          messagingSenderId: "264152153312",
          appId: "1:264152153312:web:75fbc799ee8bd4fa5f2485",
          measurementId: "G-Y6JKT7W4TK"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Get references to HTML elements
        const googleSignInBtn = document.getElementById('google-sign-in-btn');
        const signOutBtn = document.getElementById('sign-out-btn');
        const authStatus = document.getElementById('auth-status');
        const jsonDisplay = document.getElementById('json-display');

        // Google Sign-In function
        googleSignInBtn.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                // User is signed in. The user object is handled by onAuthStateChanged.
                // You can also get credential and user info directly from 'result' here if needed.
                // const user = result.user;
                // const credential = GoogleAuthProvider.credentialFromResult(result);
                // const accessToken = credential.accessToken;
            } catch (error) {
                // Handle Errors here.
                const errorCode = error.code;
                const errorMessage = error.message;
                // The email of the user's account used.
                const email = error.customData?.email;
                // The AuthCredential type that was used.
                const credential = GoogleAuthProvider.credentialFromError(error);

                console.error("Google Sign-In Error:", errorMessage);
                authStatus.textContent = `Error: ${errorMessage}`;
                jsonDisplay.textContent = JSON.stringify({ errorCode, errorMessage, email, credential }, null, 2);
            }
        });

        // Sign Out function
        signOutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                // User is signed out. The state change is handled by onAuthStateChanged.
            } catch (error) {
                console.error("Sign Out Error:", error.message);
                authStatus.textContent = `Error during sign out: ${error.message}`;
            }
        });

        // Listen for authentication state changes
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in
                authStatus.textContent = `Welcome, ${user.displayName || user.email}!`;
                googleSignInBtn.style.display = 'none';
                signOutBtn.style.display = 'inline-block';

                // Display user info as JSON
                // We create a simpler object to avoid circular references and include relevant details
                const userInfo = {
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName,
                    photoURL: user.photoURL,
                    emailVerified: user.emailVerified,
                    isAnonymous: user.isAnonymous,
                    providerData: user.providerData.map(profile => ({
                        providerId: profile.providerId,
                        uid: profile.uid,
                        displayName: profile.displayName,
                        email: profile.email,
                        photoURL: profile.photoURL
                    })),
                    // You can add more user properties if needed.
                    // To get the full token, use user.getIdTokenResult().then(idTokenResult => console.log(idTokenResult.token));
                };
                jsonDisplay.textContent = JSON.stringify(userInfo, null, 2);
            } else {
                // User is signed out
                authStatus.textContent = 'No user signed in.';
                googleSignInBtn.style.display = 'inline-block';
                signOutBtn.style.display = 'none';
                jsonDisplay.textContent = 'No user signed in.';
            }
        });
    </script>
</body>
</html>
