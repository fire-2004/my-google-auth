<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Debug Google Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4285F4;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --code-bg: #000000;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
            margin-top: 20px;
        }

        /* UI State */
        #login-ui, #profile-ui, #loading-ui { display: none; }

        .user-header { margin-bottom: 25px; }
        #user-photo {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 10px;
            object-fit: cover;
        }

        /* JSON Box */
        .json-section {
            text-align: left;
            margin-top: 25px;
            background: var(--code-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #334155;
        }
        .json-section h4 {
            margin: 0 0 10px 0;
            color: #10b981;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        pre {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            color: #34d399;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-google { background: white; color: #1e293b; }
        .btn-logout { background: #ef4444; color: white; margin-top: 20px; }

        /* Spinner */
        .spinner {
            border: 4px solid #334155;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading-ui" style="display: block;">
            <div class="spinner"></div>
            <p>Mengecek Sesi Login...</p>
        </div>

        <div id="login-ui">
            <h2 style="margin-top: 0;">Debug Mode</h2>
            <p style="color: var(--text-dim)">Ketuk tombol di bawah untuk login. Data JSON akan muncul di sini setelah sukses.</p>
            <button class="btn btn-google" id="login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18" alt="G">
                Login dengan Google
            </button>
        </div>

        <div id="profile-ui">
            <div class="user-header">
                <img id="user-photo" src="" alt="Photo">
                <h2 id="user-name" style="margin: 5px 0;"></h2>
                <p id="user-email" style="margin: 0; color: var(--text-dim);"></p>
            </div>

            <div class="json-section">
                <h4>Data JSON dari Google:</h4>
                <pre id="json-display">Memproses data...</pre>
            </div>

            <button class="btn btn-logout" id="logout-btn">Logout & Hapus Sesi</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { 
            getAuth, signInWithRedirect, getRedirectResult, 
            GoogleAuthProvider, onAuthStateChanged, signOut,
            setPersistence, browserLocalPersistence 
        } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        // Step 1: Inisialisasi
        alert("INFO: Script Firebase Berhasil Dimuat!");

        const firebaseConfig = {
            apiKey: "AIzaSyDUs1G-nzJwL78GsaUQX-BmbRz6QSW6_kU",
            authDomain: "testing-eb8f6.firebaseapp.com",
            projectId: "testing-eb8f6",
            storageBucket: "testing-eb8f6.firebasestorage.app",
            messagingSenderId: "264152153312",
            appId: "1:264152153312:web:75fbc799ee8bd4fa5f2485",
            measurementId: "G-Y6JKT7W4TK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginUi = document.getElementById('login-ui');
        const profileUi = document.getElementById('profile-ui');
        const loadingUi = document.getElementById('loading-ui');
        const jsonDisplay = document.getElementById('json-display');

        // FUNGSI LOGIN
        document.getElementById('login-btn').onclick = async () => {
            try {
                alert("INFO: Sedang mengalihkan ke Google...");
                await setPersistence(auth, browserLocalPersistence);
                signInWithRedirect(auth, provider);
            } catch (e) {
                alert("ERROR LOGIN: " + e.message);
            }
        };

        // FUNGSI LOGOUT
        document.getElementById('logout-btn').onclick = () => {
            signOut(auth).then(() => {
                alert("Sesi dihapus. Me-refresh halaman...");
                window.location.reload();
            });
        };

        // Step 2: Tangkap hasil setelah balik dari Google
        getRedirectResult(auth)
            .then((result) => {
                if (result) {
                    alert("SUKSES: Berhasil masuk sebagai " + result.user.displayName);
                }
            })
            .catch((err) => {
                // INI ALERT PALING PENTING. Kalau ada error authorized domain, muncul di sini.
                alert("ERROR REDIRECT: " + err.code + "\n" + err.message);
            });

        // Step 3: Monitor Status Login (Persistent)
        onAuthStateChanged(auth, (user) => {
            loadingUi.style.display = 'none';
            if (user) {
                alert("INFO: User terdeteksi login (" + user.email + ")");
                loginUi.style.display = 'none';
                profileUi.style.display = 'block';
                
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-photo').src = user.photoURL;

                // Tampilkan JSON yang rapi
                const dataKeLayar = {
                    uid: user.uid,
                    name: user.displayName,
                    email: user.email,
                    photo: user.photoURL,
                    metadata: user.metadata,
                    token: user.stsTokenManager
                };
                jsonDisplay.innerText = JSON.stringify(dataKeLayar, null, 2);
            } else {
                loginUi.style.display = 'block';
                profileUi.style.display = 'none';
            }
        });
    </script>
</body>
</html>
