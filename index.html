<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Google Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4285F4;
            --bg: #f8fafc;
            --text: #1e293b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container & Card Design */
        .auth-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 90%;
            max-width: 400px;
            text-align: center;
            transition: all 0.3s ease;
        }

        /* UI States */
        #login-ui, #profile-ui, #loading-ui { display: none; }

        /* Typography */
        h2 { font-weight: 700; margin-bottom: 8px; font-size: 24px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; }

        /* Profile Elements */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }
        #user-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #e2e8f0;
            object-fit: cover;
        }
        .status-dot {
            height: 15px;
            width: 15px;
            background-color: #22c55e;
            border-radius: 50%;
            position: absolute;
            bottom: 5px;
            right: 5px;
            border: 3px solid white;
        }

        /* Buttons Style */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:active { transform: scale(0.98); }

        .btn-google {
            background: white;
            color: #334155;
            border: 1px solid #e2e8f0;
        }
        .btn-google:hover { background: #f1f5f9; }

        .btn-logout {
            background: #fee2e2;
            color: #ef4444;
            margin-top: 20px;
        }
        .btn-logout:hover { background: #fecaca; }

        /* Loading Animation */
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="auth-card">
        <div id="loading-ui" style="display: block;">
            <div class="spinner"></div>
            <h3>Menyiapkan Sesi...</h3>
        </div>

        <div id="login-ui">
            <h2>Selamat Datang</h2>
            <p>Silakan masuk untuk mengakses dashboard Anda.</p>
            <button class="btn btn-google" id="login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18" alt="Google Icon">
                Login dengan Google
            </button>
        </div>

        <div id="profile-ui">
            <div class="avatar-wrapper">
                <img id="user-photo" src="" alt="Profile">
                <div class="status-dot"></div>
            </div>
            <h2 id="user-name">Memuat Nama...</h2>
            <p id="user-email">email@domain.com</p>
            <button class="btn btn-logout" id="logout-btn">Keluar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithRedirect, 
            getRedirectResult, 
            GoogleAuthProvider, 
            onAuthStateChanged, 
            signOut,
            setPersistence,
            browserLocalPersistence 
        } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        // Konfigurasi Project eb8f6
        const firebaseConfig = {
            apiKey: "AIzaSyDUs1G-nzJwL78GsaUQX-BmbRz6QSW6_kU",
            authDomain: "testing-eb8f6.firebaseapp.com",
            projectId: "testing-eb8f6",
            storageBucket: "testing-eb8f6.firebasestorage.app",
            messagingSenderId: "264152153312",
            appId: "1:264152153312:web:75fbc799ee8bd4fa5f2485",
            measurementId: "G-Y6JKT7W4TK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginUi = document.getElementById('login-ui');
        const profileUi = document.getElementById('profile-ui');
        const loadingUi = document.getElementById('loading-ui');

        // FUNGSI LOGIN
        document.getElementById('login-btn').onclick = async () => {
            // Mengatur persistensi agar sesi tersimpan di browser storage
            await setPersistence(auth, browserLocalPersistence);
            signInWithRedirect(auth, provider);
        };

        // FUNGSI LOGOUT
        document.getElementById('logout-btn').onclick = () => {
            signOut(auth).then(() => window.location.reload());
        };

        // CEK HASIL REDIRECT (Saat kembali dari Google)
        getRedirectResult(auth).catch((err) => {
            if(err.code !== 'auth/no-auth-event') alert("Error: " + err.message);
        });

        // OBSERVER: Ini yang menjaga user tetap login
        onAuthStateChanged(auth, (user) => {
            loadingUi.style.display = 'none';
            if (user) {
                // User sudah login
                loginUi.style.display = 'none';
                profileUi.style.display = 'block';
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-photo').src = user.photoURL;
            } else {
                // User belum login
                loginUi.style.display = 'block';
                profileUi.style.display = 'none';
            }
        });
    </script>
</body>
</html>
